name: dart_smb2
description: Flutter SMB2/3 client built on top of libsmb2. Targets macOS, Windows, Linux, iOS and Android.
version: 0.0.5
homepage: https://github.com/ales-drnz/dart_smb2
repository: https://github.com/ales-drnz/dart_smb2
issue_tracker: https://github.com/ales-drnz/dart_smb2/issues

topics:
  - cross-platform
  - smb2
  - smb3
  - samba
  - libsmb2

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.11.1
  flutter: ">=3.3.0"

dependencies:
  ffi: ^2.1.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        pluginClass: DartSmb2Plugin
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        pluginClass: DartSmb2Plugin
        ffiPlugin: true
      windows:
        ffiPlugin: true
