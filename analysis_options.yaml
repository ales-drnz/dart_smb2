# Static analysis configuration for dart_smb2.
#
# Builds on package:lints/recommended (the set pub.dev scores against) with a
# curated stricter ruleset appropriate for a published library: enforced API
# docs, const usage, trailing commas, and awaited futures.

include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  exclude:
    - docs/**

linter:
  rules:
    # Public API hygiene for a published package.
    - public_member_api_docs
    - package_api_docs
    # Const correctness.
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    # Immutability / finals.
    - prefer_final_locals
    - prefer_final_in_for_each
    # Async safety.
    - unawaited_futures
    # Style / consistency.
    - require_trailing_commas
    - directives_ordering
    - sort_pub_dependencies
    - prefer_single_quotes
    - use_super_parameters
    - avoid_redundant_argument_values
    - unnecessary_parenthesis
